name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [ dev ]

jobs:
  # Check for changed files first
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    outputs:
      dart-changed: ${{ steps.dart-changes.outputs.any_changed }}
      dart-files: ${{ steps.dart-changes.outputs.all_changed_files }}
      build-changed: ${{ steps.build-changes.outputs.any_changed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed Dart files
        id: dart-changes
        uses: tj-actions/changed-files@v47
        with:
          files: |
            **/*.dart

      - name: Get changed build-relevant files
        id: build-changes
        uses: tj-actions/changed-files@v47
        with:
          files: |
            lib/**
            assets/**
            pubspec.yaml
            pubspec.lock
            analysis_options.yaml

  analyze:
    name: Analyze Code
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.dart-changed == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-flutter-deps-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-deps-

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.5'
          channel: 'stable'
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Create .env file for analyzer
        run: touch .env

      - name: Analyze changed files only (faster)
        run: |
          echo "🔍 Analyzing only changed Dart files for faster feedback..."

          changed_files="${{ needs.detect-changes.outputs.dart-files }}"
          for file in $changed_files; do
            echo "  Analyzing: $file"
            flutter analyze --fatal-infos --fatal-warnings "$file" || exit 1
          done

          echo "✅ Incremental analysis complete!"

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.dart-changed == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-flutter-deps-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-deps-

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.5'
          channel: 'stable'
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Create .env file for tests
        run: touch .env

      - name: Run unit and widget tests
        run: flutter test --concurrency=4

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [detect-changes, analyze, test]
    if: |
      always() &&
      needs.detect-changes.outputs.build-changed == 'true' &&
      (needs.analyze.result == 'success' || needs.analyze.result == 'skipped') &&
      (needs.test.result == 'success' || needs.test.result == 'skipped')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-flutter-deps-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-deps-

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.5'
          channel: 'stable'
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Create .env file
        if: github.event.pull_request.head.repo.full_name == github.repository
        run: echo "${{ secrets.DOTENV }}" > .env

      - name: Create empty .env file for forks
        if: github.event.pull_request.head.repo.full_name != github.repository
        run: touch .env

      - name: Cache build artifacts
        id: build-cache
        uses: actions/cache@v4
        with:
          path: |
            build/
            .dart_tool/build/
          key: build-${{ hashFiles('pubspec.lock') }}-${{ hashFiles('lib/**', 'assets/**', 'analysis_options.yaml') }}-${{ runner.os }}
          restore-keys: |
            build-${{ hashFiles('pubspec.lock') }}-${{ runner.os }}-
            build-${{ runner.os }}-

      - name: Build from cache (if available)
        if: steps.build-cache.outputs.cache-hit == 'true'
        run: |
          echo "✅ Build artifacts restored from cache!"
          echo "📦 Skipping build - no relevant changes detected"
          ls -la build/ || echo "Build directory structure:"

      - name: Build from source (cache miss)
        if: steps.build-cache.outputs.cache-hit != 'true'
        run: |
          echo "🔨 Building from source..."
          flutter build bundle
          echo "✅ Build complete - artifacts cached for future runs"
